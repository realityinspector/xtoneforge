<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="forgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2E8F0;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#CBD5E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94A3B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="anvilDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C084FC;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#anvilDark)" />
  <circle cx="256" cy="256" r="248" fill="none" stroke="#475569" stroke-width="2" />

  <!-- Anvil base (industrial element) -->
  <path d="M 140 380 L 372 380 L 392 400 L 392 420 L 120 420 L 120 400 Z" fill="#475569" />
  <path d="M 140 380 L 372 380 L 392 400 L 120 400 Z" fill="#64748B" />

  <!-- The X - bold, industrial, forged steel look -->
  <!-- Left stroke of X (top-left to bottom-right) -->
  <path d="
    M 128 100
    L 188 100
    L 296 256
    L 188 412
    L 128 412
    L 220 272
    L 236 256
    L 220 240
    Z
  " fill="url(#metalSheen)" />

  <!-- Right stroke of X (top-right to bottom-left) -->
  <path d="
    M 384 100
    L 324 100
    L 216 256
    L 324 412
    L 384 412
    L 292 272
    L 276 256
    L 292 240
    Z
  " fill="url(#metalSheen)" />

  <!-- Forge glow at the intersection -->
  <circle cx="256" cy="256" r="36" fill="url(#forgeGlow)" filter="url(#glow)" opacity="0.9" />

  <!-- Inner bright core -->
  <circle cx="256" cy="256" r="16" fill="#C084FC" opacity="0.7" />

  <!-- Spark lines radiating from center -->
  <g stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.6" filter="url(#glow)">
    <line x1="256" y1="210" x2="256" y2="190" />
    <line x1="290" y1="220" x2="304" y2="206" />
    <line x1="300" y1="256" x2="316" y2="256" />
    <line x1="290" y1="292" x2="304" y2="306" />
    <line x1="256" y1="302" x2="256" y2="318" />
    <line x1="222" y1="292" x2="208" y2="306" />
    <line x1="212" y1="256" x2="196" y2="256" />
    <line x1="222" y1="220" x2="208" y2="206" />
  </g>

  <!-- Subtle forge heat marks on the X -->
  <path d="M 220 240 L 236 256 L 220 272 L 292 272 L 276 256 L 292 240 Z" fill="url(#forgeGlow)" opacity="0.4" />
</svg>
